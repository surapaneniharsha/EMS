name: Run Tests from Jira

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Jira issue key"
        required: false
        type: string
      issue_status:
        description: "Jira status"
        required: false
        type: string

  repository_dispatch:
    types: [jira-test-trigger]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Give permission
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean build -x test


  run-tests:
    needs: build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: ems_db
        ports:
          - 5432:5432
        options: >-
          -v ${{ github.workspace }}/db:/docker-entrypoint-initdb.d/
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Give permission
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean build -x test

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Run SQL script
        run: |
          PGPASSWORD=admin psql -h localhost -U postgres -d ems_db -f db/EMS_db.sql

      - name: Debug DB
        env:
          PGPASSWORD: admin
        run: |
          echo "Schemas:"
          psql -h localhost -U postgres -d ems_db -c "\dn"
          echo "Tables:"
          psql -h localhost -U postgres -d ems_db -c "\dt *.*"

      - name: Run Tests
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ems_db
          DB_USER: postgres
          DB_PASSWORD: admin

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: build/reports/tests/

      - name: Print Jira issue
        run: echo "Triggered by ${{ github.event.inputs.issue_key }}"
 
  notify:
    needs: [build, run-tests]
    runs-on: ubuntu-latest
    if: always()

    steps:

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAILS }}
          from: ${{ secrets.SMTP_USERNAME }}

          subject: "Jira issue ${{ github.event.inputs.issue_key }} update"

          body: |
            Jira issue ${{ github.event.inputs.issue_key }} update.

            Repository : ${{ github.repository }}

            Jira issue Details
            ------------------------------------------
            Jira issue Number : ${{ github.event.inputs.issue_key }}
            Jira issue Status : ${{ github.event.inputs.issue_status }}

            Test Cases Run-status : ${{ needs.run-tests.result }}

            View Workflow Logs and Test Reports:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}


      - name: Comment on Jira (Success)
        if: needs.run-tests.result == 'success'
        run: |
          curl -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{
              \"body\": \"✅ Automation tests PASSED in GitHub CI.\nWorkflow: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/comment


      - name: Move Jira to Tested
        if: needs.run-tests.result == 'success'
        run: |
          curl -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "transition": { "id": "41" }
            }' \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/transitions


      - name: Comment on Jira (Failure)
        if: needs.run-tests.result == 'failure'
        run: |
          curl -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{
              \"body\": \"❌ Automation tests FAILED.\nPlease check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/comment


      - name: Move Jira to In Progress
        if: needs.run-tests.result == 'failure'
        run: |
          curl -X POST \
            -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{
              "transition": { "id": "21" }
            }' \
            ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/transitions
