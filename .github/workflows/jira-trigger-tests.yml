name: Run Tests from Jira

on:
  workflow_dispatch:
    inputs:
      issue_key:
        description: "Jira issue key"
        required: true
        type: string
      issue_status:
        description: "Jira status"
        required: false
        type: string

  repository_dispatch:
    types: [jira-test-trigger]

jobs:

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew clean build -x test


  run-tests:
    needs: build
    runs-on: ubuntu-latest

    outputs:
      total: ${{ steps.summary.outputs.total }}
      passed: ${{ steps.summary.outputs.passed }}
      failed: ${{ steps.summary.outputs.failed }}
      skipped: ${{ steps.summary.outputs.skipped }}

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
          POSTGRES_DB: ems_db
        ports:
          - 5432:5432

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Install PostgreSQL Client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for Postgres
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5432 && break
            sleep 2
          done

      - name: Run SQL Script
        run: |
          PGPASSWORD=admin psql -h localhost -U postgres -d ems_db -f db/EMS_db.sql

      - name: Run Tests
        run: ./gradlew test
        env:
          DB_URL: jdbc:postgresql://localhost:5432/ems_db
          DB_USER: postgres
          DB_PASSWORD: admin

      - name: Extract Test Summary
        id: summary
        if: always()
        run: |
          TOTAL=$(grep -o 'tests="[0-9]*"' build/test-results/test/*.xml | head -1 | grep -o '[0-9]*')
          FAIL=$(grep -o 'failures="[0-9]*"' build/test-results/test/*.xml | head -1 | grep -o '[0-9]*')
          SKIP=$(grep -o 'skipped="[0-9]*"' build/test-results/test/*.xml | head -1 | grep -o '[0-9]*')
          PASS=$((TOTAL - FAIL - SKIP))

          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "passed=$PASS" >> $GITHUB_OUTPUT
          echo "failed=$FAIL" >> $GITHUB_OUTPUT
          echo "skipped=$SKIP" >> $GITHUB_OUTPUT

      - name: Upload Test Reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: build/reports/tests/


  notify:
    needs: run-tests
    runs-on: ubuntu-latest
    if: always()

    steps:

      - name: Send Email Notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAILS }}
          from: ${{ secrets.SMTP_USERNAME }}

          subject: "Jira issue ${{ github.event.inputs.issue_key }} update"

          body: |
            Jira Issue : ${{ github.event.inputs.issue_key }}

            Test Results
            -------------------------------
            Total Tests : ${{ needs.run-tests.outputs.total }}
            Passed      : ${{ needs.run-tests.outputs.passed }}
            Failed      : ${{ needs.run-tests.outputs.failed }}
            Skipped     : ${{ needs.run-tests.outputs.skipped }}

            Test Status : ${{ needs.run-tests.result }}

            Workflow Logs:
            https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}


      - name: Comment Jira with Test Results
        run: |
          curl -X POST \
          -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data "{
            \"body\":{
              \"type\":\"doc\",
              \"version\":1,
              \"content\":[
                {
                  \"type\":\"paragraph\",
                  \"content\":[
                    {
                      \"type\":\"text\",
                      \"text\":\"Automation Test Results\n\nTotal Tests: ${{ needs.run-tests.outputs.total }}\nPassed: ${{ needs.run-tests.outputs.passed }}\nFailed: ${{ needs.run-tests.outputs.failed }}\nSkipped: ${{ needs.run-tests.outputs.skipped }}\n\nExecuted via GitHub CI.\"
                    }
                  ]
                }
              ]
            }
          }" \
          ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/comment


      - name: Move Jira to Tested
        if: needs.run-tests.result == 'success'
        run: |
          curl -X POST \
          -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"transition":{"id":"12"}}' \
          ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/transitions


      - name: Move Jira to In Progress
        if: needs.run-tests.result == 'failure'
        run: |
          curl -X POST \
          -u "${{ secrets.JIRA_EMAIL }}:${{ secrets.JIRA_API_TOKEN }}" \
          -H "Content-Type: application/json" \
          --data '{"transition":{"id":"4"}}' \
          ${{ secrets.JIRA_BASE_URL }}/rest/api/3/issue/${{ github.event.inputs.issue_key }}/transitions
